workflows:

  # ── iOS Development Build ─────────────────────────────────────────────────────
  # Genera un .ipa de desarrollo firmado para instalar en dispositivos físicos.
  # Se lanza automáticamente en cada push a main.
  ios-development:
    name: CMG Telematics — iOS Development
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20.18.0
      xcode: 16.3
      cocoapods: default
      vars:
        BUNDLE_ID: "es.cmgnexus.telematics"
        XCODE_SCHEME: "CMGTelematics"
        EXPO_PUBLIC_API_URL: "http://213.210.20.183/api/v1"
      groups:
        - apple_signing

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Instalar dependencias Node
        script: |
          cd mobile
          npm install --legacy-peer-deps

      - name: Expo Prebuild (genera proyecto iOS nativo)
        script: |
          cd mobile
          npx expo prebuild --platform ios --clean --no-install
          # NODE_BINARY: path absoluto para que el bundle script lo encuentre en Release
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env
          # ENTRY_FILE: entry point de Expo Router (más fiable en .xcode.env.local que en build settings)
          echo "export ENTRY_FILE=node_modules/expo-router/entry.js" > ios/.xcode.env.local

      - name: CocoaPods install
        script: |
          cd mobile/ios
          gem install cocoapods --no-document 2>/dev/null || true
          pod install --repo-update

      - name: Eliminar entitlement Push Notifications (no disponible en perfil dev)
        script: |
          ENTITLEMENTS="mobile/ios/CMGTelematics/CMGTelematics.entitlements"
          if [ -f "$ENTITLEMENTS" ]; then
            plutil -remove "aps-environment" "$ENTITLEMENTS" 2>/dev/null || true
          fi

      - name: Verificar bundle Metro (diagnóstico — muestra el error real si falla)
        script: |
          cd mobile
          export NODE_BINARY=$(which node)
          echo "Node: $(which node) — $(node --version)"
          echo "ENTRY_FILE: node_modules/expo-router/entry.js"
          echo "metro.config.js existe: $([ -f metro.config.js ] && echo SI || echo NO)"
          echo "babel.config.js existe: $([ -f babel.config.js ] && echo SI || echo NO)"
          echo "Paquetes clave:"
          ls node_modules | grep -E "^(metro|babel-preset-expo|expo-router)$" || true
          echo ""
          echo "--- Probando bundle Metro directamente ---"
          "${NODE_BINARY}" node_modules/.bin/react-native bundle \
            --entry-file node_modules/expo-router/entry.js \
            --platform ios \
            --dev false \
            --bundle-output /tmp/test-main.jsbundle \
            --assets-dest /tmp/test-assets \
            --reset-cache
          echo "--- Bundle Metro OK ---"

      - name: Configurar firma y build
        script: |
          cd mobile
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --issuer-id "$ASCISSUERID" \
            --key-id "$ASCKEYID" \
            --private-key "$ASCPRIVATEKEY" \
            --type IOS_APP_DEVELOPMENT \
            --create
          xcode-project use-profiles
          xcodebuild \
            -workspace ios/CMGTelematics.xcworkspace \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/xcarchive/CMGTelematics.xcarchive \
            archive
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/CMGTelematics.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/


    artifacts:
      - mobile/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - camaro734@icloud.com
        notify:
          success: true
          failure: true

  # ── iOS Production Build ──────────────────────────────────────────────────────
  # Para subir a TestFlight / App Store. Lanzar manualmente desde Codemagic.
  ios-production:
    name: CMG Telematics — iOS Production
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: 20.18.0
      xcode: 16.3
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: es.cmgnexus.telematics
      vars:
        BUNDLE_ID: "es.cmgnexus.telematics"
        XCODE_SCHEME: "CMGTelematics"
        APP_STORE_CONNECT_ISSUER_ID: $ASCISSUERID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $ASCKEYID
        APP_STORE_CONNECT_PRIVATE_KEY: $ASCPRIVATEKEY
        EXPO_PUBLIC_API_URL: "http://213.210.20.183/api/v1"
      groups:
        - apple_signing

    scripts:
      - name: Instalar dependencias Node
        script: |
          cd mobile
          npm install --legacy-peer-deps

      - name: Expo Prebuild
        script: |
          cd mobile
          npx expo prebuild --platform ios --clean --no-install

      - name: Configurar NODE_BINARY para Xcode build scripts
        script: |
          echo "export NODE_BINARY=$(which node)" > mobile/ios/.xcode.env
          echo "export ENTRY_FILE=node_modules/expo-router/entry.js" >> mobile/ios/.xcode.env
          cat mobile/ios/.xcode.env

      - name: Verificar bundle Metro pre-build
        script: |
          cd mobile || true
          npx expo export --platform ios --output-dir /tmp/metro-check 2>&1 | tail -20
          ls -lh /tmp/metro-check/

      - name: CocoaPods install
        script: |
          cd mobile/ios
          pod install

      - name: Build iOS App Store
        script: |
          cd mobile
          xcode-project build-ipa \
            --workspace ios/CMGTelematics.xcworkspace \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - mobile/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $ASCPRIVATEKEY
        key_id: $ASCKEYID
        issuer_id: $ASCISSUERID
        submit_to_testflight: true
      email:
        recipients:
          - camaro734@icloud.com
        notify:
          success: true
          failure: true
