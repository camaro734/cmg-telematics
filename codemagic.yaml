workflows:

  # ── iOS Development Build ─────────────────────────────────────────────────────
  # Genera un .ipa de desarrollo firmado para instalar en dispositivos físicos.
  # Se lanza automáticamente en cada push a main.
  ios-development:
    name: CMG Telematics — iOS Development
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 23.11.1
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: development
        bundle_identifier: es.cmgnexus.telematics
      vars:
        BUNDLE_ID: "es.cmgnexus.telematics"
        XCODE_SCHEME: "CMGTelematics"
        APP_STORE_CONNECT_ISSUER_ID: $ASCISSUERID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $ASCKEYID
        APP_STORE_CONNECT_PRIVATE_KEY: $ASCPRIVATEKEY
      groups:
        - apple_signing

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Instalar dependencias Node
        script: |
          cd mobile
          npm install --legacy-peer-deps

      - name: Expo Prebuild (genera proyecto iOS nativo)
        script: |
          cd mobile
          npx expo prebuild --platform ios --clean --no-install

      - name: CocoaPods install
        script: |
          cd mobile/ios
          pod install

      - name: Eliminar entitlement Push Notifications (no disponible en perfil dev)
        script: |
          ENTITLEMENTS="mobile/ios/CMGTelematics/CMGTelematics.entitlements"
          if [ -f "$ENTITLEMENTS" ]; then
            plutil -remove "aps-environment" "$ENTITLEMENTS" 2>/dev/null || true
          fi

      - name: Configurar firma y build
        script: |
          cd mobile

          # Codemagic ios_signing ya descargó certificado y perfil — solo aplicar
          xcode-project use-profiles

          # Archivar
          xcodebuild \
            -workspace ios/CMGTelematics.xcworkspace \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -archivePath build/ios/xcarchive/CMGTelematics.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            "DEVELOPMENT_TEAM=XN3LPVTURB" \
            COMPILER_INDEX_STORE_ENABLE=NO

          # Exportar .ipa
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/CMGTelematics.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /dev/stdin <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>development</string>
            <key>signingStyle</key><string>manual</string>
            <key>compileBitcode</key><false/>
          </dict></plist>
          PLIST

    artifacts:
      - mobile/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - camaro734@icloud.com
        notify:
          success: true
          failure: true

  # ── iOS Production Build ──────────────────────────────────────────────────────
  # Para subir a TestFlight / App Store. Lanzar manualmente desde Codemagic.
  ios-production:
    name: CMG Telematics — iOS Production
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: 23.11.1
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: es.cmgnexus.telematics
      vars:
        BUNDLE_ID: "es.cmgnexus.telematics"
        XCODE_SCHEME: "CMGTelematics"
        APP_STORE_CONNECT_ISSUER_ID: $ASCISSUERID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $ASCKEYID
        APP_STORE_CONNECT_PRIVATE_KEY: $ASCPRIVATEKEY
      groups:
        - apple_signing

    scripts:
      - name: Instalar dependencias Node
        script: |
          cd mobile
          npm install --legacy-peer-deps

      - name: Expo Prebuild
        script: |
          cd mobile
          npx expo prebuild --platform ios --clean --no-install

      - name: CocoaPods install
        script: |
          cd mobile/ios
          pod install

      - name: Build iOS App Store
        script: |
          cd mobile
          xcode-project build-ipa \
            --workspace ios/CMGTelematics.xcworkspace \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - mobile/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $ASCPRIVATEKEY
        key_id: $ASCKEYID
        issuer_id: $ASCISSUERID
        submit_to_testflight: true
      email:
        recipients:
          - camaro734@icloud.com
        notify:
          success: true
          failure: true
